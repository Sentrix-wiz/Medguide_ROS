# Mission configuration for MedGuide Hospital Assistant Robot
# Defines room locations, delivery goals, and mission parameters

hospital_map:
  frame_id: "map"
  rooms:
    room_a:
      description: "Patient Room A - West Wing"
      position:
        x: 1.0
        y: 1.0
        z: 0.0
      orientation:
        roll: 0.0
        pitch: 0.0
        yaw: 0.0
      
    room_b:
      description: "Patient Room B - East Wing"
      position:
        x: 5.0
        y: 1.0
        z: 0.0
      orientation:
        roll: 0.0
        pitch: 0.0
        yaw: 0.0
      
    room_c:
      description: "Patient Room C - North Wing"
      position:
        x: 5.0
        y: 5.0
        z: 0.0
      orientation:
        roll: 0.0
        pitch: 0.0
        yaw: 0.0
    
    dock:
      description: "Charging Dock - Service Station"
      position:
        x: 0.5
        y: 0.5
        z: 0.0
      orientation:
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

# Default mission sequence for testing
mission_defaults:
  sequence: ["room_a", "room_b", "room_c", "dock"]
  loop_enabled: false  # Set true for continuous delivery loop
  loop_count: 1

# Safety constraints
safety:
  obstacle_distance_threshold_m: 0.3      # meters
  emergency_stop_enabled: true
  max_linear_velocity_mps: 0.5            # m/s
  max_angular_velocity_rps: 1.0           # rad/s
  
# Goal tolerance
navigation:
  goal_timeout_seconds: 120
  goal_tolerance_distance_m: 0.2
  goal_tolerance_angle_rad: 0.1

# Battery simulation
battery:
  initial_level_percent: 100.0
  drain_rate_percent_per_min: 0.5
  critical_level_percent: 20.0
  warning_level_percent: 40.0
